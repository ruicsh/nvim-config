name: backup

on: push

jobs:
  backup:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@main
        with:
          fetch-depth: "0"
      - uses: ruicsh/backup-action@main
        with:
          bitbucket_token: ${{ secrets.BITBUCKET_TOKEN }}
          target_repo: ruicsh/nvim-config
